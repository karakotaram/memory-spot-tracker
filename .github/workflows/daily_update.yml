name: Daily Memory Price Update

on:
  schedule:
    # Run at 12:00 UTC (20:00 GMT+8, after Asian markets close)
    - cron: '0 12 * * 1-5'
  workflow_dispatch:  # Manual trigger for testing

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape prices
        run: python main.py scrape

      - name: Send email report
        run: python main.py email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/data/
          git diff --staged --quiet || git commit -m "Update memory spot prices $(date -u +%Y-%m-%d)"
          git push
